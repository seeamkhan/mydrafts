name: Update FIFA Results

# Pulls the latest FIFA World Cup results (TheSportsDB) and commits the updated
# fifa-schedule.html back to main. This repo's GitHub Pages is served the legacy
# way from main's root, so the push alone re-publishes the page at
# https://seeamkhan.github.io/mydrafts/fifa-schedule.html. We deliberately do NOT
# use actions/deploy-pages, which would change the existing Pages build type.
#
# This repo is PUBLIC, so GitHub-hosted Actions minutes are unlimited and free.
# The schedule below runs 4x/day, comfortably within any free-tier limit.

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"   # 01:00, 07:00, 13:00, 19:00 UTC (4 runs/day)
  workflow_dispatch: {}            # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-fifa-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest results and update page
        run: python scripts/update_fifa_results.py

      - name: Commit and push if the page changed
        run: |
          if [[ -n "$(git status --porcelain fifa-schedule.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add fifa-schedule.html
            git commit -m "Auto-update FIFA results ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No result changes; nothing to commit."
          fi
